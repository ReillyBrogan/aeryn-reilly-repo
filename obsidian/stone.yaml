name        : obsidian
version     : "1.12.7"
release     : 2
summary     : Obsidian
license     : LicenseRef-Obsidian
homepage    : https://vesktop.vencord.dev
upstreams   :
    - https://github.com/obsidianmd/obsidian-releases/releases/download/v1.12.7/obsidian-1.12.7.tar.gz:
        hash: fcbe08b111d9c1fdb09b9c08952b06e1c829c62163eba2584c4b4ec859be079d
description : |
    Obsidian
builddeps   :
    - binary(ar)
    - binary(bsdtar-static)
    - binary(ln)
rundeps     :
    - binary(xdg-open)
    # - binary(python3)
    # - soname(libXss.so.1(x86_64))
    # - soname(libatomic.so.1(x86_64))
debug       : false
strip       : false
install     : |
    obsidiandir=%(libdir)/%(name)

    %install_dir %(installroot)$obsidiandir
    cp -a ./* %(installroot)$obsidiandir

    %install_dir %(installroot)%(bindir)
    ln -srv %(installroot)$obsidiandir/obsidian %(installroot)%(bindir)/obsidian

    %install_file %(pkgdir)/obsidian.desktop -t %(installroot)/usr/share/applications/

    %install_dir %(installroot)/%(datadir)/icons/hicolor/512x512/apps
    ln -srv %(installroot)$obsidiandir/resources/icon.png %(installroot)/%(datadir)/icons/hicolor/512x512/apps/obsidian.png
